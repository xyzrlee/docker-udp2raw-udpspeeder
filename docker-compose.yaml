version: '3'
services:
    udp2raw-udpspeeder-server:
        build: .
        image: xyzrlee/udp2raw-udpspeeder
        network_mode: "host"
        cap_add:
            - NET_ADMIN
        environment:
            - SERVICE_ROLE=server
            - SERVICE_LISTEN_IP=127.0.0.1
            - SERVICE_LISTEN_PORT=40001
            - SERVICE_REMOTE_IP=127.0.0.1
            - SERVICE_REMOTE_PORT=40000
            - SERVICE_TMP_PORT=50000
            - UDP2RAW_CIPHER_MODE=xor
            - UDP2RAW_AUTH_MODE=simple 
            - UDP2RAW_DISABLE_COLOR=
            - UDP2RAW_FIX_GRO=
            - UDPSPEEDER_FEC=1:3,2:4,8:6,20:10
            - UDPSPEEDER_TIMEOUT=0
            - UDPSPEEDER_MODE=0
            - UDPSPEEDER_REPORT=10
            - UDPSPEEDER_DISABLE_COLOR=
    udp2raw-udpspeeder-client:
        build: .
        image: xyzrlee/udp2raw-udpspeeder
        network_mode: "host"
        cap_add:
            - NET_ADMIN
        environment:
            - SERVICE_ROLE=server
            - SERVICE_LISTEN_IP=127.0.0.1
            - SERVICE_LISTEN_PORT=40002
            - SERVICE_REMOTE_IP=127.0.0.1
            - SERVICE_REMOTE_PORT=40001
            - SERVICE_TMP_PORT=50001
            - UDP2RAW_CIPHER_MODE=xor
            - UDP2RAW_AUTH_MODE=simple 
            - UDP2RAW_DISABLE_COLOR=
            - UDP2RAW_FIX_GRO=
            - UDPSPEEDER_FEC=1:3,2:4,8:6,20:10
            - UDPSPEEDER_TIMEOUT=0
            - UDPSPEEDER_MODE=0
            - UDPSPEEDER_REPORT=10
            - UDPSPEEDER_DISABLE_COLOR=
